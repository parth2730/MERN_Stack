<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            box-shadow: rgba(50, 50, 93, 0.25) 0px 30px 60px -12px inset, rgba(0, 0, 0, 0.3) 0px 18px 36px -18px inset;
            height: 500px;
            width: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

        }
        .btn{
            display: flex;
            gap: 10px;
        }
        button{
            width: 70px;
            font-size: xx-large;
        }
        img{
            height:250px;
            width: 250px;
        }
        button:hover{
            cursor: pointer;
            background-color: beige;
        }
    </style>
</head>
<body>
    <div id = "container">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRZ7qSAEqp9s0NFwIJJp6aI5I4x-MHiDwsgWScBawz8cg&s" alt="">
        <h3>King Khan</h3>
        <div class = "btn">
            <button id = "likebutton">👍</button>
            <h3>Likes: <span id = "lcount">0</span></h3>
        </div>
        <div class = "btn">
            <button id = "dislikebutton">👎</button>
            <h3>DisLi: <span id = "dcount">0</span></h3>
        </div>
        


    </div>
</body>
</html>
<script>
    var button = document.getElementById("likebutton")
    var count = 0
    button.addEventListener("click",function(){
        
        count+=1
        var lcount = document.getElementById("lcount")
        lcount.innerText=count
    })

    var button = document.getElementById("dislikebutton")
    var count1 = 0
    button.addEventListener("click",function(){
        count1+=1
        var dcount = document.getElementById("dcount")
        dcount.innerText=count1
    })

    

    // var button = document.getElementById("dislikebutton")
    

</script>
